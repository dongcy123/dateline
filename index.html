<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>川上</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2/umd/supabase.min.js"></script>
    <script>tailwind.config = {theme:{extend:{fontFamily:{sans:['Inter','Noto Sans SC','PingFang SC','sans-serif']},colors:{beige:{50:'#FCF9F6',100:'#F5F0EB',200:'#EDE7E0',300:'#E8E0D8'},lavender:{100:'#E8E4F4',200:'#D4CEE8',300:'#B8B5E0',400:'#A89FCD',500:'#8B7FB8',600:'#6B5E9A'}},animation:{'fade-in':'fadeIn 0.3s ease-out','slide-down':'slideDown 0.3s ease-out','shimmer':'shimmer 2s ease-in-out infinite','pulse-glow':'pulseGlow 2s ease-in-out infinite','float':'float 6s ease-in-out infinite'},keyframes:{fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},slideDown:{'0%':{opacity:'0',transform:'translateY(-6px)'},'100%':{opacity:'1',transform:'translateY(0)'}},shimmer:{'0%,100%':{opacity:'0.4'},'50%':{opacity:'0.8'}},pulseGlow:{'0%,100%':{boxShadow:'0 0 0 0 rgba(184,181,224,0.4)'},'50%':{boxShadow:'0 0 0 8px rgba(184,181,224,0)'}},float:{'0%,100%':{transform:'translateY(0px)'},'50%':{transform:'translateY(-8px)'}}}}}}</script>
    <style>
        :root {
            --bg-primary: #F5F0EB;
            --bg-secondary: #EDE7E0;
            --bg-tertiary: #E8E0D8;
            --accent-100: #E8E4F4;
            --accent-200: #D4CEE8;
            --accent-300: #B8B5E0;
            --accent-400: #A89FCD;
            --accent-500: #8B7FB8;
            --accent-600: #6B5E9A;
            --glass-bg: rgba(255,255,255,0.62);
            --glass-bg-strong: rgba(255,255,255,0.72);
            --glass-bg-light: rgba(255,255,255,0.38);
            --glass-border: rgba(255,255,255,0.75);
            --glass-border-subtle: rgba(255,255,255,0.50);
            --glass-blur: 20px;
            --text-primary: #2D2838;
            --text-secondary: #5C5670;
            --text-tertiary: #8B84A0;
            --text-inverse: #F5F0EB;
            --shadow-card: none;
            --shadow-card-hover: none;
            --shadow-header: none;
            --border-card: 0.5px solid rgba(0,0,0,0.07);
            --border-card-hover: 0.5px solid rgba(0,0,0,0.12);
            --border-header: 0.5px solid rgba(0,0,0,0.06);
            --color-success: #7EB8A0;
            --color-error: #C48080;
        }
        .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .beige-bg{background:var(--bg-primary)}
        .glass{background:#fff;border:var(--border-card);border-radius:12px}
        .glass-strong{background:#fff;border:var(--border-header)}
        .glass-light{background:rgba(0,0,0,0.02);border:var(--border-card)}
        .flow-scroll{scroll-behavior:smooth;overscroll-behavior-y:contain}
        .grain::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
        @keyframes toastIn{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}
        .animate-in{animation:toastIn .3s ease-out}
    </style>
</head>
<body class="h-screen w-screen overflow-hidden font-sans selection:bg-lavender-200/40 grain" style="background:var(--bg-primary);color:var(--text-primary)">
<div id="root" class="h-full w-full"></div>
<div id="fallback" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:red;z-index:9999;font-size:20px">React 未加载</div>

<!-- 全局常量和工具 — 在所有组件之前 -->
<script type="text/babel">
window.Kawa = window.Kawa || {};

Object.assign(window.Kawa, {
    OBJ_PALETTE: ['#8B7FB8','#A89FCD','#C48080','#7EB8A0','#B8A080','#8090B8','#A080B0','#6B5E9A','#9B8FC0','#C89090','#88B8A8','#B89088','#8898B8','#9888B0','#7B6EA0'],
    TYPE_LABELS: { todo: '待办', note: '笔记' },
    EV_KEY: 'kw_events_v3',
    OBJ_KEY: 'kw_obj_v3',
    MOCK_OBJS: [],
    MOCK_EVENTS: [],
    uid: () => window.crypto?.randomUUID?.() || Math.random().toString(36).substr(2,9) + Date.now().toString(36),
    fmtTime: (d) => new Intl.DateTimeFormat('zh-CN',{hour:'2-digit',minute:'2-digit'}).format(d),
    fmtDate: (d) => new Intl.DateTimeFormat('zh-CN',{month:'short',day:'numeric'}).format(d),
    tsDay: (d) => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'),
    todayStr: () => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); },
});
</script>

<script type="text/babel" src="components/icons.js"></script>
<script type="text/babel" src="components/storage.js"></script>
<script type="text/babel" src="components/ai.js"></script>
<script type="text/babel" src="components/event-card.js"></script>
<script type="text/babel" src="components/obj-editor.js"></script>
<script type="text/babel" src="components/hud.js"></script>
<script type="text/babel" src="components/omnibox.js"></script>
<script type="text/babel" src="components/chat.js"></script>
<script type="text/babel" src="app.js"></script>
</body>
</html>
