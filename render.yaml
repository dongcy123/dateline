services:
  - type: web
    name: kawakami
    runtime: node
    buildCommand: cd web && npm ci && npm run build
    startCommand: node server.js
    plan: free
    envVars:
      - key: DEEPSEEK_KEY
        sync: false
      - key: VISION_KEY
        sync: false
      - key: VISION_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: VISION_MODEL
        value: qwen-vl-max
