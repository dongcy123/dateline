<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>流水账</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 引入 Babel 编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            900: '#18181b',
                            950: '#09090b',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        /* 隐藏滚动条但保持可滚动 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 待确认卡片的呼吸发光特效 */
        .glow-pending {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.6);
        }

        /* Toast 淡入动画 */
        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -12px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .animate-in {
            animation: toastIn 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 h-screen w-screen overflow-hidden font-sans selection:bg-blue-500/30">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // 图标组件 (使用原生 SVG 替代外部库以确保稳定性)
        const Icons = {
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Mic: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
            Camera: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>,
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Coffee: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>,
            Briefcase: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const formatTime = (date) => new Intl.DateTimeFormat('zh-CN', { hour: '2-digit', minute: '2-digit' }).format(date);
        const formatDate = (date) => new Intl.DateTimeFormat('zh-CN', { month: 'short', day: 'numeric' }).format(date);

        // ==========================================
        // 核心更新：自动生成大量丰富的多维度模拟数据
        // ==========================================
        const generateMockEvents = () => {
            const data = [];
            const now = new Date();
            const tags = ['餐饮', '购物', '交通', '娱乐', '教育'];
            const priorities = ['低', '普通', '高'];
            
            // 覆盖过去20天到未来10天
            for (let i = -20; i <= 10; i++) {
                const currentDate = new Date(now.getTime() + i * 24 * 60 * 60 * 1000);
                
                // 每天随机生成 0~5 条记录
                const eventCount = Math.floor(Math.random() * 6);
                
                for (let j = 0; j < eventCount; j++) {
                    const eventDate = new Date(currentDate);
                    // 随机打乱当天的小时和分钟
                    eventDate.setHours(Math.floor(Math.random() * 24), Math.floor(Math.random() * 60));
                    
                    // 随机决定这条记录的类型
                    const r = Math.random();
                    let type = r < 0.4 ? 'expense' : (r < 0.7 ? 'todo' : 'note');
                    
                    let ai_metadata = {};
                    let raw_content = "";
                    let status = (i < 0) ? 'done' : 'confirmed'; // 过去的默认done，未来的默认confirmed
                    
                    if (type === 'expense') {
                        const isBigExpense = Math.random() > 0.8;
                        const amount = isBigExpense ? Math.floor(Math.random() * 2000) + 500 : Math.floor(Math.random() * 150) + 10;
                        const tag = tags[Math.floor(Math.random() * tags.length)];
                        ai_metadata = { amount, tag };
                        raw_content = isBigExpense ? `买了大件物品，花了 ${amount} 元` : `日常消费 ${amount} 元`;
                    } else if (type === 'todo') {
                        const priority = priorities[Math.floor(Math.random() * priorities.length)];
                        ai_metadata = { task: `测试任务 ${generateId().substr(0,4)}`, priority };
                        raw_content = priority === '高' ? `[紧急] 必须完成这个任务！` : `记得去处理一下这件事情`;
                        if (i >= 0 && Math.random() > 0.5) status = 'pending'; // 未来的任务有概率是待确认
                    } else {
                        ai_metadata = { tags: ['灵感', '随记'] };
                        raw_content = `灵感记录：今天突然想到一个好主意... (${generateId()})`;
                    }

                    data.push({
                        id: generateId(),
                        timeline_time: eventDate.toISOString(),
                        record_time: new Date().toISOString(),
                        raw_content,
                        type,
                        status,
                        ai_metadata
                    });
                }
            }
            // 额外确保"现在"附近一定有数据
            data.push({
                id: generateId(),
                timeline_time: new Date(now.getTime() - 1000 * 60 * 15).toISOString(),
                record_time: new Date().toISOString(),
                raw_content: "刚刚喝了一杯星巴克拿铁 32元",
                type: "expense",
                status: "done",
                ai_metadata: { amount: 32, tag: "餐饮" }
            });
            return data;
        };

        const initialEvents = generateMockEvents();

        // ==========================================
        // API 密钥管理与配置
        // ==========================================
        const getConfig = () => {
            // URL 参数优先 (方便分享和快速配置)
            const params = new URLSearchParams(window.location.search);
            const dk = params.get('dk') || params.get('deepseek_key');
            const vk = params.get('vk') || params.get('vision_key');

            if (dk) sessionStorage.setItem('deepseek_key', dk);
            if (vk) sessionStorage.setItem('vision_key', vk);

            // 清除 URL 参数，保护密钥
            if (dk || vk) {
                const url = new URL(window.location);
                url.searchParams.delete('dk');
                url.searchParams.delete('deepseek_key');
                url.searchParams.delete('vk');
                url.searchParams.delete('vision_key');
                window.history.replaceState({}, '', url);
            }

            return {
                deepseekKey: sessionStorage.getItem('deepseek_key') || '',
                visionKey: sessionStorage.getItem('vision_key') || '',
                visionModel: sessionStorage.getItem('vision_model') || 'qwen-vl-max',
                visionBaseUrl: sessionStorage.getItem('vision_base_url') || 'https://dashscope.aliyuncs.com/compatible-mode/v1',
                supabaseUrl: sessionStorage.getItem('supabase_url') || '',
                supabaseKey: sessionStorage.getItem('supabase_key') || '',
                proxyUrl: sessionStorage.getItem('proxy_url') || 'http://localhost:8765',
                hasRealAI: () => !!(sessionStorage.getItem('deepseek_key') || sessionStorage.getItem('vision_key') || sessionStorage.getItem('supabase_url') || sessionStorage.getItem('proxy_url')),
                hasProxy: () => !!(sessionStorage.getItem('supabase_url') && sessionStorage.getItem('supabase_key')),
                hasLocalProxy: () => {
                    // Local proxy is always preferred when available
                    return true; // Always try local proxy first
                },
            };
        };

        const SYSTEM_PROMPT = `你是一个个人管理助手。分析用户输入并返回严格的 JSON。

规则：
1. 如果涉及金额、消费、购物 → type: "expense"，ai_metadata: {"amount": 数字, "tag": "餐饮|购物|交通|娱乐|教育|其他"}
2. 如果是任务、待办、提醒 → type: "todo"，ai_metadata: {"task": "任务名", "priority": "high|normal|low"}
3. 其他记录、想法、笔记 → type: "note"，ai_metadata: {"summary": "摘要"}

只返回 JSON，不要任何额外文字。`;

        // ==========================================
        // 真实 AI 引擎 (文本通道 → DeepSeek)
        // ==========================================
        const callDeepSeekAPI = async (text) => {
            const config = getConfig();
            if (!config.deepseekKey) throw { code: 'api_key_missing', message: '未配置 DeepSeek API 密钥' };

            const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${config.deepseekKey}`,
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: SYSTEM_PROMPT },
                        { role: 'user', content: `分析以下中文输入，判断类型并提取结构化数据：\n\n"${text}"` },
                    ],
                    temperature: 0.3,
                    response_format: { type: 'json_object' },
                }),
            });

            if (!res.ok) {
                const errText = await res.text();
                if (res.status === 401) throw { code: 'api_key_invalid', message: 'DeepSeek API 密钥无效' };
                if (res.status === 429) throw { code: 'rate_limit', message: '请求过于频繁，请稍后再试' };
                throw { code: 'api_error', message: `DeepSeek API 错误 (${res.status}): ${errText}` };
            }

            const data = await res.json();
            const content = data.choices?.[0]?.message?.content;
            if (!content) throw { code: 'parse_error', message: 'AI 返回为空' };

            try {
                return JSON.parse(content);
            } catch {
                // Vision models 可能返回 markdown 包裹的 JSON
                const cleaned = content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                return JSON.parse(cleaned);
            }
        };

        // ==========================================
        // 真实 AI 引擎 (图像通道 → Vision 多模态模型)
        // ==========================================
        const callVisionAPI = async (imageBase64) => {
            const config = getConfig();
            if (!config.visionKey) throw { code: 'api_key_missing', message: '未配置视觉模型 API 密钥' };

            const res = await fetch(`${config.visionBaseUrl}/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${config.visionKey}`,
                },
                body: JSON.stringify({
                    model: config.visionModel,
                    messages: [
                        { role: 'system', content: SYSTEM_PROMPT },
                        {
                            role: 'user',
                            content: [
                                { type: 'image_url', image_url: { url: imageBase64 } },
                                { type: 'text', text: '请识别这张图片并提取结构化信息。如果是收据/小票，提取金额和分类。如果是海报/文档，提取关键信息。' },
                            ],
                        },
                    ],
                    temperature: 0.3,
                }),
            });

            if (!res.ok) {
                const errText = await res.text();
                if (res.status === 401) throw { code: 'api_key_invalid', message: '视觉模型 API 密钥无效' };
                if (res.status === 429) throw { code: 'rate_limit', message: '请求过于频繁，请稍后再试' };
                throw { code: 'api_error', message: `视觉模型 API 错误 (${res.status}): ${errText}` };
            }

            const data = await res.json();
            const content = data.choices?.[0]?.message?.content;
            if (!content) throw { code: 'parse_error', message: '视觉 AI 返回为空' };

            try {
                return JSON.parse(content);
            } catch {
                const cleaned = content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                return JSON.parse(cleaned);
            }
        };

        // ==========================================
        // 本地 AI 代理 (绕过 CORS — 开发环境首选)
        // ==========================================
        const callLocalProxy = async (request) => {
            const config = getConfig();
            const res = await fetch(config.proxyUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(request),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw {
                    code: err.error?.code || 'api_error',
                    message: err.error?.message || `代理错误 (${res.status})`,
                };
            }

            return res.json();
        };

        // ==========================================
        // Supabase Edge Function Proxy
        // ==========================================
        const callSupabaseProxy = async (request) => {
            const config = getConfig();
            const url = `${config.supabaseUrl}/functions/v1/ai-proxy`;

            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${config.supabaseKey}`,
                },
                body: JSON.stringify(request),
            });

            if (!res.ok) {
                const err = await res.json();
                throw {
                    code: err.error?.code || 'api_error',
                    message: err.error?.message || `Edge Function 错误 (${res.status})`,
                };
            }

            return res.json();
        };

        // ==========================================
        // 模拟 AI (兜底方案 — 无 API 密钥时使用)
        // ==========================================
        const mockTextAI = (text) => {
            return new Promise((resolve) => {
                setTimeout(() => {
                    let type = 'note';
                    let ai_metadata = {};
                    if (text.includes('买') || text.includes('花') || text.includes('钱') || /\d+(\.\d+)?(元|块)/.test(text)) {
                        type = 'expense';
                        const match = text.match(/\d+(\.\d+)?/);
                        ai_metadata = { amount: match ? parseFloat(match[0]) : 0, tag: '杂项' };
                    } else if (text.includes('要') || text.includes('记得') || text.includes('去')) {
                        type = 'todo';
                        ai_metadata = { task: text.replace(/记得|要|去/, '').trim(), priority: text.includes('紧急') ? '高' : '普通' };
                    } else {
                        ai_metadata = { summary: text.substring(0, 10) + '...' };
                    }
                    resolve({ type, ai_metadata });
                }, 600);
            });
        };

        const mockVisionAI = () => {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve({
                        type: 'expense',
                        ai_metadata: { amount: 128.5, tag: '购物', merchant: '苹果零售店 (模拟图片识别)' }
                    });
                }, 1200);
            });
        };

        const HUDHeader = ({ budget, exp, toggleHeatmap, isHeatmapOpen, events, selectedDate, onSelectDate }) => {
            // 日历核心逻辑
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const startOffset = firstDay === 0 ? 6 : firstDay - 1; // 周一为起始日

            // 数据聚合计算 (为渲染渐变热力做准备)
            const dayStats = useMemo(() => {
                const stats = {};
                events.forEach(e => {
                    const d = new Date(e.timeline_time);
                    if (d.getFullYear() === year && d.getMonth() === month) {
                        const dateKey = d.getDate();
                        if (!stats[dateKey]) stats[dateKey] = { exp: 0, todo: 0, note: 0 };

                        if (e.type === 'expense') stats[dateKey].exp += (e.ai_metadata?.amount || 0);
                        else if (e.type === 'todo') stats[dateKey].todo += 1;
                        else if (e.type === 'note') stats[dateKey].note += 1;
                    }
                });
                return stats;
            }, [events, year, month]);

            // 寻找当月最大值用于计算比例 (占比 0~1)
            let maxExp = 0, maxTodo = 0, maxNote = 0;
            Object.values(dayStats).forEach(s => {
                if (s.exp > maxExp) maxExp = s.exp;
                if (s.todo > maxTodo) maxTodo = s.todo;
                if (s.note > maxNote) maxNote = s.note;
            });

            // 渲染日历网格
            const renderCalendarDays = () => {
                const cells = [];
                // 填充上月空白
                for(let i=0; i<startOffset; i++) cells.push(<div key={`empty-${i}`} className="opacity-0"></div>);

                for(let d=1; d<=daysInMonth; d++) {
                    const stats = dayStats[d] || { exp: 0, todo: 0, note: 0 };
                    const wExp = maxExp ? Math.min(stats.exp / maxExp, 1) : 0;
                    const wTodo = maxTodo ? Math.min(stats.todo / maxTodo, 1) : 0;
                    const wNote = maxNote ? Math.min(stats.note / maxNote, 1) : 0;

                    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const isSelected = selectedDate === dateStr;
                    const hasData = wExp > 0 || wTodo > 0 || wNote > 0;

                    // 核心视觉：根据占比生成三色混合的发光渐变 (类似上传的科技球体)
                    // 青色(Note) 蓝色(Todo) 紫色(Expense)
                    const bgStyle = hasData ? {
                        background: `
                            radial-gradient(circle at 30% 30%, rgba(34,211,238,${wNote * 0.9}) 0%, transparent 60%),
                            radial-gradient(circle at 70% 70%, rgba(168,85,247,${wExp * 0.9}) 0%, transparent 60%),
                            radial-gradient(circle at 50% 50%, rgba(59,130,246,${wTodo * 0.9}) 0%, transparent 70%),
                            #18181b
                        `,
                        boxShadow: isSelected ? '0 0 20px rgba(255,255,255,0.2)' : (hasData ? `0 0 10px rgba(59,130,246,${(wNote+wExp+wTodo)/3 * 0.5})` : 'none')
                    } : { backgroundColor: '#18181b' };

                    cells.push(
                        <div 
                            key={d} 
                            onClick={() => onSelectDate(dateStr)}
                            style={bgStyle}
                            className={`aspect-square rounded-full flex items-center justify-center text-xs cursor-pointer transition-all duration-300
                                ${isSelected ? 'ring-2 ring-white scale-110 z-10 text-white font-bold' : 'hover:scale-110 hover:ring-1 ring-zinc-500 text-zinc-300'}
                                ${!hasData && !isSelected ? 'opacity-50' : ''}`}
                        >
                            {d}
                        </div>
                    );
                }
                return cells;
            };

            return (
                <div className="absolute top-0 w-full z-50">
                    {/* 半透明玻璃态 Header */}
                    <div className="bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-800/50 px-4 pt-12 pb-4 flex flex-col gap-3">
                        <div className="flex justify-between items-end">
                            <h1 className="text-xl font-bold tracking-tight">流水<span className="text-blue-500">账</span></h1>
                            <button onClick={toggleHeatmap} className="text-zinc-500 hover:text-zinc-300 transition-colors flex items-center gap-1 text-sm">
                                {isHeatmapOpen ? '收起日历' : '展开日历'} <Icons.ChevronDown />
                            </button>
                        </div>
                        
                        {/* 状态血条 */}
                        <div className="flex gap-4 items-center">
                            <div className="flex-1 flex flex-col gap-1.5">
                                <div className="flex justify-between text-xs text-zinc-500 font-medium">
                                    <span>预算池</span>
                                    <span className="text-purple-400">¥{budget.remain} / {budget.total}</span>
                                </div>
                                <div className="h-1.5 w-full bg-zinc-800 rounded-full overflow-hidden">
                                    <div className="h-full bg-gradient-to-r from-purple-500 to-fuchsia-400 rounded-full" style={{width: `${(budget.remain/budget.total)*100}%`}}></div>
                                </div>
                            </div>
                            <div className="flex-1 flex flex-col gap-1.5">
                                <div className="flex justify-between text-xs text-zinc-500 font-medium">
                                    <span>今日任务</span>
                                    <span className="text-blue-400">{exp.done} / {exp.total}</span>
                                </div>

            // 默认视图 (添加了点击事件以进入编辑模式)
            return (
                <div className="flex gap-4 w-full relative group cursor-pointer" onClick={() => setIsEditing(true)}>
                    {/* 时间轴连线与节点 */}
                    <div className="flex flex-col items-center min-w-[48px]">
                        <div className="text-xs text-zinc-400 font-medium mb-1">{formatTime(date)}</div>
                        <div className={`w-3 h-3 rounded-full border-2 border-zinc-950 z-10 ${isPending ? 'bg-blue-500 animate-pulse' : 'bg-zinc-700'}`}></div>
                        <div className="w-px h-full bg-zinc-800 absolute top-6 -bottom-6"></div>
                    </div>

                    {/* 卡片主体 */}
                    <div className={`flex-1 mb-6 p-4 rounded-2xl border transition-all duration-300 backdrop-blur-sm
                        ${isPending ? 'bg-zinc-900/80 border-blue-500/50 glow-pending' : 'bg-zinc-900/40 border-zinc-800/50 hover:bg-zinc-900/60 hover:border-zinc-700'}`}>
                        
                        <div className="flex justify-between items-start mb-2">
                            <div className={`flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10px] font-semibold border ${getColor()}`}>

                                <span>{getTypeLabel(event.type)}</span>

                        <div className="text-sm text-zinc-200 mb-3">{event.raw_content}</div>

                        {/* AI 解析出来的结构化数据展示 */}
                        {Object.keys(event.ai_metadata).length > 0 && (
                            <div className="bg-zinc-950/50 rounded-lg p-2.5 mb-3 border border-zinc-800/50">
                                <div className="text-[10px] text-zinc-500 mb-1 flex items-center gap-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                                    AI 结构化数据

                                <div className="flex flex-wrap gap-2">
                                    {Object.entries(event.ai_metadata).map(([key, val]) => (
                                        <div key={key} className="text-xs bg-zinc-800/50 px-2 py-1 rounded text-zinc-300">
                                            <span className="text-zinc-500 mr-1">{getKeyLabel(key)}:</span>

                        {/* 待确认状态的 Action 按钮 */}
                        {isPending && (
                            <div className="flex gap-2 mt-2">
                                <button 
                                    onClick={(e) => {
                                        e.stopPropagation(); // 阻止事件冒泡，防止触发卡片的进入编辑模式
                                        onConfirm(event.id);

                                    className="flex-1 bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium py-2 rounded-xl flex items-center justify-center gap-1 transition-colors">

            );
        };

        const Omnibox = ({ onSubmitText, onSimulateVision, isProcessing, engineStatus }) => {
            const [text, setText] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (text.trim() && !isProcessing) {
                    onSubmitText(text);
                    setText('');
                }
            };

            return (
                <div className="absolute bottom-0 w-full p-4 bg-gradient-to-t from-zinc-950 via-zinc-950 to-transparent pb-8 z-50">
                    <form onSubmit={handleSubmit} className="flex items-center gap-2 max-w-lg mx-auto bg-zinc-900 border border-zinc-800 rounded-full p-1.5 pr-2 shadow-2xl backdrop-blur-xl transition-all focus-within:border-zinc-700">
                        
                        {/* 左侧：触发视觉多模态大模型 */}
                        <button 
                            type="button" 
                            onClick={onSimulateVision}
                            disabled={isProcessing}
                            className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white hover:bg-zinc-700 transition-colors disabled:opacity-50">
                            <Icons.Camera />
                        </button>
                        
                        {/* 中间：文本输入通道 */}
                        <input 
                            type="text" 
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                            placeholder={isProcessing ? (engineStatus === 'live' ? "DeepSeek AI 思考中..." : "本地引擎处理中...") : (engineStatus === 'live' ? "输入记录或指令... ⚡DeepSeek" : "输入记录或指令... (模拟引擎)")}
                            disabled={isProcessing}
                            className="flex-1 bg-transparent border-none outline-none text-sm px-2 text-zinc-100 placeholder:text-zinc-600 disabled:opacity-50"
                        />
                        
                        {/* 右侧：提交或语音(此处模拟文本提交) */}
                        {text.trim() ? (
                            <button 
                                type="submit" 
                                disabled={isProcessing}
                                className="w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center hover:bg-blue-400 transition-colors disabled:opacity-50">
                                <Icons.Send />
                            </button>
                        ) : (
                            <button 
                                type="button" 
                                disabled={isProcessing}
                                className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white hover:bg-zinc-700 transition-colors disabled:opacity-50">
                                <Icons.Mic />
                            </button>
                        )}
                    </form>
                </div>
            );
        };

        const App = () => {
            const [events, setEvents] = useState(initialEvents);
            const [isHeatmapOpen, setIsHeatmapOpen] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [selectedDate, setSelectedDate] = useState(null);
            const [aiError, setAiError] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [engineStatus, setEngineStatus] = useState(getConfig().hasRealAI() ? 'live' : 'mock');
            
            const feedRef = useRef(null);
            const nowMarkerRef = useRef(null);

            // 滚动到 "NOW" 轴心 (仅在初次加载时)
            useEffect(() => {
                if (nowMarkerRef.current && !selectedDate) {
                    nowMarkerRef.current.scrollIntoView({ behavior: 'auto', block: 'center' });
                }
            }, []);

            // 核心更新：点击日历日期 -> 寻找锚点并平滑滚动
            const handleSelectDate = (dateStr) => {
                setSelectedDate(dateStr);
                
                setTimeout(() => {
                    const targetId = `date-divider-${dateStr}`;
                    const el = document.getElementById(targetId);
                    
                    if (el) {
                        // 滚动到屏幕中间
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        // 找到该日期的标签，加上高亮发光特效，然后淡出
                        const pillEl = el.querySelector('.date-pill');
                        if (pillEl) {
                            pillEl.classList.add('bg-blue-500/30', 'text-blue-400', 'border-blue-500/80', 'scale-110', 'shadow-[0_0_15px_rgba(59,130,246,0.5)]');
                            setTimeout(() => {
                                pillEl.classList.remove('bg-blue-500/30', 'text-blue-400', 'border-blue-500/80', 'scale-110', 'shadow-[0_0_15px_rgba(59,130,246,0.5)]');
                            }, 1500);
                        }
                    } else {
                        // 如果当天完全没有数据，回弹到最近的地方或者做个小提示（这里选择控制台打印）
                        console.log("该日期无记录");
                    }
                }, 50);
            };

            // 数据仅排序，不再被 selectedDate 强制过滤隐藏
            const sortedEvents = useMemo(() => {
                return [...events].sort((a, b) => new Date(b.timeline_time) - new Date(a.timeline_time));
            }, [events]);
            
            const now = new Date();
            const futureEvents = sortedEvents.filter(e => new Date(e.timeline_time) > now);
            const pastEvents = sortedEvents.filter(e => new Date(e.timeline_time) <= now);

            // 渲染列表并插入日期分割线的辅助函数
            const renderEventsWithDateDividers = (eventList) => {
                let lastDate = null;
                return eventList.map(event => {
                    const d = new Date(event.timeline_time);
                    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    const showDivider = lastDate !== dateStr;
                    lastDate = dateStr;
                    
                    return (
                        <React.Fragment key={event.id}>
                            {showDivider && (
                                <div id={`date-divider-${dateStr}`} className="w-full flex items-center gap-4 py-6 opacity-80 transition-all duration-500">
                                    <div className="h-px flex-1 bg-zinc-800/50"></div>
                                    <div className="date-pill text-[10px] font-mono text-zinc-500 bg-zinc-900/50 px-3 py-1 rounded-full border border-zinc-800 transition-all duration-500 ease-out">
                                        {dateStr}
                                    </div>
                                    <div className="h-px flex-1 bg-zinc-800/50"></div>
                                </div>
                            )}
                            <EventCard 
                                event={event} 
                                onConfirm={confirmEvent} 
                                onUpdate={updateEvent}
                                onDelete={deleteEvent}
                            />
                        </React.Fragment>
                    );
                });
            };

            // 发送文本给 AI (真实引擎 → 模拟引擎兜底)
            const handleTextSubmit = async (text) => {
                setIsProcessing(true);
                let aiResult;
                let usedRealAI = false;

                try {
                    // 优先级: 本地代理 > Edge Function > DeepSeek直接 > 模拟
                    if (getConfig().hasLocalProxy()) {
                        aiResult = await callLocalProxy({ text, engine: 'text' });
                        usedRealAI = true;
                    } else if (getConfig().hasProxy()) {
                        aiResult = await callSupabaseProxy({ text, engine: 'text' });
                        usedRealAI = true;
                    } else if (getConfig().hasRealAI()) {
                        aiResult = await callDeepSeekAPI(text);
                        usedRealAI = true;
                    } else {
                        aiResult = await mockTextAI(text);
                    }
                } catch (err) {
                    console.error('[AI Error]', err);
                    setAiError({ message: err.message || 'AI 调用失败', code: err.code || 'unknown' });
                    // 降级到模拟 AI
                    aiResult = await mockTextAI(text);
                    setAiError(prev => prev ? { ...prev, fallback: '已降级到本地模拟引擎' } : null);
                }

                const newEvent = {
                    id: generateId(),
                    timeline_time: new Date().toISOString(),
                    record_time: new Date().toISOString(),
                    raw_content: text,
                    type: aiResult.type,
                    status: 'pending',
                    ai_metadata: { ...aiResult.ai_metadata, _engine: getConfig().hasLocalProxy() ? 'local-proxy' : (getConfig().hasProxy() ? 'supabase-proxy' : (usedRealAI ? 'deepseek' : 'mock')) }
                };

                setEvents(prev => [newEvent, ...prev]);
                setIsProcessing(false);

                setTimeout(() => {
                    if (nowMarkerRef.current) {
                        nowMarkerRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            };

            // 拍照发送给视觉大模型 (真实引擎 → 模拟引擎兜底)
            const handleVisionSubmit = async () => {
                setIsProcessing(true);
                let aiResult;
                let usedRealAI = false;

                try {
                    if (getConfig().hasLocalProxy() || getConfig().hasProxy() || getConfig().hasRealAI()) {
                        const input = document.createElement('input');
                        input.type = 'file';
                        input.accept = 'image/*';
                        const file = await new Promise((resolve) => {
                            input.onchange = (e) => resolve(e.target.files[0]);
                            input.oncancel = () => resolve(null);
                            input.click();
                        });
                        if (!file) { setIsProcessing(false); return; }
                        const base64 = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result);
                            reader.readAsDataURL(file);
                        });
                        // 优先级: 本地代理 > Edge Function > Vision直接
                        if (getConfig().hasLocalProxy()) {
                            aiResult = await callLocalProxy({ image_url: base64, engine: 'vision' });
                        } else if (getConfig().hasProxy()) {
                            aiResult = await callSupabaseProxy({ image_url: base64, engine: 'vision' });
                        } else {
                            aiResult = await callVisionAPI(base64);
                        }
                        usedRealAI = true;
                    } else if (getConfig().hasRealAI()) {
                        const input = document.createElement('input');
                        input.type = 'file';
                        input.accept = 'image/*';
                        const file = await new Promise((resolve) => {
                            input.onchange = (e) => resolve(e.target.files[0]);
                            input.oncancel = () => resolve(null);
                            input.click();
                        });
                        if (file) {
                            const base64 = await new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onload = () => resolve(reader.result);
                                reader.readAsDataURL(file);
                            });
                            aiResult = await callVisionAPI(base64);
                            usedRealAI = true;
                        } else {
                            setIsProcessing(false);
                            return;
                        }
                    } else {
                        aiResult = await mockVisionAI();
                    }
                } catch (err) {
                    console.error('[Vision AI Error]', err);
                    setAiError({ message: err.message || '视觉 AI 调用失败', code: err.code || 'unknown' });
                    aiResult = await mockVisionAI();
                    setAiError(prev => prev ? { ...prev, fallback: '已降级到本地模拟引擎' } : null);
                }

                const newEvent = {
                    id: generateId(),
                    timeline_time: new Date().toISOString(),
                    record_time: new Date().toISOString(),
                    raw_content: "[图片凭证已上传 - AI解析]",
                    type: aiResult.type,
                    status: 'pending',
                    ai_metadata: { ...aiResult.ai_metadata, _engine: getConfig().hasProxy() ? 'supabase-proxy' : (usedRealAI ? 'vision' : 'mock') }
                };

                setEvents(prev => [newEvent, ...prev]);
                setIsProcessing(false);
            };

            const confirmEvent = (id) => {
                setEvents(prev => prev.map(e => 
                    e.id === id ? { ...e, status: e.type === 'todo' ? 'confirmed' : 'done' } : e
                ));
            };

            const updateEvent = (id, updatedData) => {
                setEvents(prev => prev.map(e => 
                    e.id === id ? { ...e, ...updatedData } : e
                ));
            };

            const deleteEvent = (id) => {
                setEvents(prev => prev.filter(e => e.id !== id));
            };

            return (
                <div className="relative h-full w-full flex flex-col">
                    {/* 背景层 */}
                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900/20 via-zinc-950 to-zinc-950 z-0"></div>

                    {/* AI 引擎状态指示器 */}
                    <div className="absolute top-4 right-4 z-[60] flex items-center gap-2">
                        <button
                            onClick={() => setShowSettings(!showSettings)}
                            className={`text-[10px] px-2 py-1 rounded-full border transition-all ${
                                engineStatus === 'live'
                                    ? 'bg-green-500/10 border-green-500/30 text-green-400'
                                    : 'bg-zinc-800 border-zinc-700 text-zinc-500'
                            }`}
                        >
                            {engineStatus === 'live' ? '⚡ AI 在线' : '🔸 模拟引擎'}
                        </button>
                    </div>

                    {/* API 密钥设置面板 */}
                    {showSettings && (
                        <div className="absolute top-12 right-4 z-[70] w-80 bg-zinc-900 border border-zinc-700 rounded-2xl p-5 shadow-2xl backdrop-blur-xl">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-sm font-semibold text-zinc-200">AI 引擎配置</h3>
                                <button onClick={() => setShowSettings(false)} className="text-zinc-500 hover:text-zinc-300 text-lg">&times;</button>
                            </div>

                            <div className="space-y-3">
                                <div className="bg-blue-500/5 border border-blue-500/10 rounded-lg p-3 mb-1">
                                    <label className="text-[10px] text-blue-400 mb-1 block font-medium">推荐：Supabase Edge Function Proxy</label>
                                    <p className="text-[10px] text-zinc-500 mb-2">密钥存储在服务端，更安全。需要部署 Edge Function。</p>
                                    <input
                                        type="text"
                                        defaultValue={getConfig().supabaseUrl}
                                        onChange={(e) => {
                                            sessionStorage.setItem('supabase_url', e.target.value);
                                            setEngineStatus(getConfig().hasRealAI() ? 'live' : 'mock');
                                        }}
                                        placeholder="https://xxx.supabase.co"
                                        className="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-xs text-zinc-200 outline-none focus:border-blue-500 mb-1"
                                    />
                                    <input
                                        type="password"
                                        defaultValue={getConfig().supabaseKey}
                                        onChange={(e) => {
                                            sessionStorage.setItem('supabase_key', e.target.value);
                                            setEngineStatus(getConfig().hasRealAI() ? 'live' : 'mock');
                                        }}
                                        placeholder="anon key"
                                        className="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-xs text-zinc-200 outline-none focus:border-blue-500"
                                    />
                                </div>

                                <div className="border-t border-zinc-800 pt-3">
                                    <label className="text-[10px] text-zinc-500 mb-2 block">或者直接配置 API 密钥：</label>
                                </div>

                                <div>
                                    <label className="text-[10px] text-zinc-500 mb-1 block">DeepSeek API Key (文本引擎)</label>
                                    <input
                                        type="password"
                                        defaultValue={getConfig().deepseekKey}
                                        onChange={(e) => {
                                            sessionStorage.setItem('deepseek_key', e.target.value);
                                            setEngineStatus(getConfig().hasRealAI() ? 'live' : 'mock');
                                        }}
                                        placeholder="sk-..."
                                        className="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-xs text-zinc-200 outline-none focus:border-blue-500"
                                    />
                                </div>
                                <div>
                                    <label className="text-[10px] text-zinc-500 mb-1 block">Vision API Key (图像引擎)</label>
                                    <input
                                        type="password"
                                        defaultValue={getConfig().visionKey}
                                        onChange={(e) => {
                                            sessionStorage.setItem('vision_key', e.target.value);
                                            setEngineStatus(getConfig().hasRealAI() ? 'live' : 'mock');
                                        }}
                                        placeholder="视觉模型 API Key..."
                                        className="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-xs text-zinc-200 outline-none focus:border-blue-500"
                                    />
                                </div>
                                <div>
                                    <label className="text-[10px] text-zinc-500 mb-1 block">Vision Base URL</label>
                                    <input
                                        type="text"
                                        defaultValue={getConfig().visionBaseUrl}
                                        onChange={(e) => sessionStorage.setItem('vision_base_url', e.target.value)}
                                        className="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-xs text-zinc-200 outline-none focus:border-blue-500"
                                    />
                                </div>
                                <div>
                                    <label className="text-[10px] text-zinc-500 mb-1 block">Vision Model</label>
                                    <select
                                        defaultValue={getConfig().visionModel}
                                        onChange={(e) => sessionStorage.setItem('vision_model', e.target.value)}
                                        className="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-xs text-zinc-200 outline-none focus:border-blue-500"
                                    >
                                        <option value="qwen-vl-max">Qwen-VL Max</option>
                                        <option value="qwen-vl-plus">Qwen-VL Plus</option>
                                        <option value="moonshot-v1-8k">Kimi (Moonshot)</option>
                                        <option value="gpt-4o">GPT-4o</option>
                                    </select>
                                </div>
                            </div>

                            <p className="text-[10px] text-zinc-600 mt-4 leading-relaxed">
                                密钥仅存储在浏览器 sessionStorage 中，不会被上传到任何服务器。
                                关闭标签页后自动清除。也可通过 URL 参数传入：
                                <code className="text-zinc-500 block mt-1">?dk=sk-xxx&vk=yyy</code>
                            </p>
                        </div>
                    )}

                    {/* AI 错误提示 Toast */}
                    {aiError && (
                        <div className="absolute top-16 left-1/2 -translate-x-1/2 z-[70] animate-in">
                            <div className="bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 text-sm backdrop-blur-xl shadow-2xl max-w-sm">
                                <div className="flex items-start gap-2">
                                    <span className="text-red-400 text-lg">⚠</span>
                                    <div>
                                        <p className="text-red-300 text-xs font-medium">{aiError.message}</p>
                                        {aiError.fallback && (
                                            <p className="text-zinc-400 text-[10px] mt-1">{aiError.fallback}</p>
                                        )}
                                    </div>
                                    <button
                                        onClick={() => setAiError(null)}
                                        className="text-zinc-500 hover:text-zinc-300 ml-2"
                                    >&times;</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HUD Header */}
                    <HUDHeader 
                        budget={{remain: 3250, total: 5000}} 
                        exp={{done: 2, total: 5}} 
                        isHeatmapOpen={isHeatmapOpen}
                        toggleHeatmap={() => setIsHeatmapOpen(!isHeatmapOpen)}
                        events={events}
                        selectedDate={selectedDate}
                        onSelectDate={handleSelectDate}
                    />

                    {/* Bi-directional Feed (中部时间轴) */}
                    <div 
                        ref={feedRef}
                        className="flex-1 overflow-y-auto no-scrollbar pt-36 pb-32 px-4 z-10 relative scroll-smooth"
                    >
                        <div className="max-w-xl mx-auto flex flex-col items-center">
                            
                            {/* 未来计划区域 (向上滑动) - 插入了日期分割线 */}
                            {renderEventsWithDateDividers(futureEvents)}

                            {/* Now 轴心 */}
                            <div ref={nowMarkerRef} className="w-full flex items-center gap-4 py-12 opacity-90">
                                <div className="h-px flex-1 bg-zinc-700"></div>
                                <div className="text-xs font-mono tracking-widest text-blue-500 bg-blue-500/10 px-4 py-1.5 rounded-full border border-blue-500/30 shadow-[0_0_15px_rgba(59,130,246,0.3)] backdrop-blur-md">
                                    现在
                                </div>
                                <div className="h-px flex-1 bg-zinc-700"></div>
                            </div>

                            {/* 历史记录区域 (向下滑动) - 插入了日期分割线 */}
                            {renderEventsWithDateDividers(pastEvents)}

                            <div className="py-12 text-xs text-zinc-700 font-mono">-- 达到时间轴边界 --</div>
                        </div>
                    </div>

                    {/* 底部输入区 */}
                    <Omnibox
                        onSubmitText={handleTextSubmit}
                        onSimulateVision={handleVisionSubmit}
                        isProcessing={isProcessing}
                        engineStatus={engineStatus}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
