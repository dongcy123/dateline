    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','Noto Sans SC','PingFang SC','sans-serif']},colors:{beige:{50:'#FCF9F6',100:'#F5F0EB',200:'#EDE7E0',300:'#E8E0D8'},lavender:{100:'#E8E4F4',200:'#D4CEE8',300:'#B8B5E0',400:'#A89FCD',500:'#8B7FB8',600:'#6B5E9A'}},animation:{'fade-in':'fadeIn 0.3s ease-out','slide-down':'slideDown 0.3s ease-out','shimmer':'shimmer 2s ease-in-out infinite','pulse-glow':'pulseGlow 2s ease-in-out infinite','float':'float 6s ease-in-out infinite'},keyframes:{fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},slideDown:{'0%':{opacity:'0',transform:'translateY(-6px)'},'100%':{opacity:'1',transform:'translateY(0)'}},shimmer:{'0%,100%':{opacity:'0.4'},'50%':{opacity:'0.8'}},pulseGlow:{'0%,100%':{boxShadow:'0 0 0 0 rgba(184,181,224,0.4)'},'50%':{boxShadow:'0 0 0 8px rgba(184,181,224,0)'}},float:{'0%,100%':{transform:'translateY(0px)'},'50%':{transform:'translateY(-8px)'}}}}}}</script>
    <style>

            --bg-secondary: #EDE7E0;

            --glass-bg-strong: rgba(255,255,255,0.72);
            --glass-bg-light: rgba(255,255,255,0.38);
            --glass-border: rgba(255,255,255,0.75);

            --shadow-card-hover: 0 8px 40px rgba(139,127,184,0.25), 0 2px 10px rgba(139,127,184,0.12), 0 0 0 1px rgba(184,181,224,0.20);

<body class="h-screen w-screen overflow-hidden font-sans selection:bg-lavender-200/40 grain" style="background:var(--bg-primary);color:var(--text-primary)">
<div id="root" class="h-full w-full"></div>
<div id="fallback" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:red;z-index:9999;font-size:20px">React 未加载</div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ==========================================
// 目标色板
// ==========================================
const OBJ_PALETTE = [
    '#8B7FB8','#A89FCD','#C48080','#7EB8A0','#B8A080','#8090B8','#A080B0','#6B5E9A',
    '#9B8FC0','#C89090','#88B8A8','#B89088','#8898B8','#9888B0','#7B6EA0',
];
const TYPE_LABELS = { todo:'待办', note:'笔记' };

// ==========================================
// 工具
// ==========================================
const uid = () => window.crypto?.randomUUID?.() || Math.random().toString(36).substr(2,9)+Date.now().toString(36);
const fmtTime = d => new Intl.DateTimeFormat('zh-CN',{hour:'2-digit',minute:'2-digit'}).format(d);
const fmtDate = d => new Intl.DateTimeFormat('zh-CN',{month:'short',day:'numeric'}).format(d);
const tsDay = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayStr = () => tsDay(new Date());

// ==========================================
// 存储: Supabase + localStorage 双写
// ==========================================
const EV_KEY = 'kw_events_v3', OBJ_KEY = 'kw_obj_v3';
const load = k => { try { const r=localStorage.getItem(k); return r?JSON.parse(r):null; }catch{ return null; } };
const save = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); }catch{} };

// Supabase 客户端
const SB_URL = 'https://gduqrtzoggpjyifxvzxy.supabase.co';
const SB_KEY = 'sb_publishable_8q1OXyDCIo6wcn82ReOa4w_-3azo0lH';
let sb = null;
try {
    if (typeof supabase !== 'undefined' && supabase.createClient) {
        sb = supabase.createClient(SB_URL, SB_KEY);
        console.log('[Supabase] connected');
    }
} catch(e) { console.log('[Supabase] not available, using localStorage only'); }

// 从 Supabase 加载数据
const loadFromSB = async () => {
    if (!sb) return null;
    try {
        const [evRes, objRes] = await Promise.all([
            sb.from('timeline_events').select('*').order('timeline_time', { ascending: false }),
            sb.from('objectives').select('*').order('created_at', { ascending: true })
        ]);
        if (evRes.error) console.warn('[SB] events:', evRes.error.message);
        if (objRes.error) console.warn('[SB] objectives:', objRes.error.message);
        return {
            events: evRes.data || [],
            objectives: objRes.data || []
        };
    } catch(e) {
        console.warn('[SB] load error:', e.message);
        return null;
    }
};

// 写入事件到 Supabase
const saveEventToSB = async (ev) => {
    if (!sb) return;
    try {
        const { error } = await sb.from('timeline_events').upsert({
            id: ev.id,
            timeline_time: ev.timeline_time,
            record_time: ev.record_time,
            raw_content: ev.raw_content,
            type: ev.type,
            status: ev.status,
            objective_id: ev.objective_id || null,
            ai_metadata: ev.ai_metadata || {}
        });
        if (error) console.warn('[SB] save event:', error.message);
    } catch(e) { console.warn('[SB] save event error:', e.message); }
};

// 删除事件从 Supabase
const deleteEventFromSB = async (id) => {
    if (!sb) return;
    try {
        const { error } = await sb.from('timeline_events').delete().eq('id', id);
        if (error) console.warn('[SB] delete event:', error.message);
    } catch(e) { console.warn('[SB] delete event error:', e.message); }
};

// 写入目标到 Supabase
const saveObjToSB = async (obj) => {
    if (!sb) return;
    try {
        const { error } = await sb.from('objectives').upsert({
            id: obj.id,
            title: obj.title,
            target: obj.target,
            current: obj.current,
            color: obj.color
        });
        if (error) console.warn('[SB] save obj:', error.message);
    } catch(e) { console.warn('[SB] save obj error:', e.message); }
};

// 删除目标从 Supabase
const deleteObjFromSB = async (id) => {
    if (!sb) return;
    try {
        const { error } = await sb.from('objectives').delete().eq('id', id);
        if (error) console.warn('[SB] delete obj:', error.message);
    } catch(e) { console.warn('[SB] delete obj error:', e.message); }
};

const MOCK_OBJS = [];

const MOCK_EVENTS = [];

// ==========================================
// AI 引擎
// ==========================================
const DK_KEY = 'sk-59667e37ac864780895095182443388f';
const AI_PROMPT = `你是《川上》个人战略执行系统的 AI 助手。分析用户输入，返回严格 JSON。

类型判断:
- todo: 待执行的行动、任务、计划
- note: 记录、想法、观察、已完成的事

输出格式:
{"type":"todo|note","objective_id":null,"ai_metadata":{"task":"摘要","progress_delta":数字,"tags":["标签"]},"timeline_time":"ISO 8601 或 null"}

progress_delta: 已完成且有数量→提取数字(如"标注10张"→10); 待做→0; 无数字→1
如果是创建目标/标签，type="objective"，ai_metadata={"title":"目标名","color":"#hex"}

时间: "下周三下午3点"→推算日期, ISO 8601格式, 无法提取则null
只返回 JSON。`;

const callAI = async (text, objectives) => {
    try {
        const r = await fetch('http://localhost:8765',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,engine:'text'})});
        if(r.ok) return await r.json();
    }catch{}
    try {
        const n=new Date(); const ns=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}T${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:00+08:00`;
        let up=`当前时间：${ns}\n\n`;
        if(objectives?.length){ up+='可用目标:\n'; objectives.forEach(o=>up+=`- ${o.id}: "${o.title}"\n`); up+='\n'; }
        up+=`分析以下中文输入：\n\n"${text}"`;
        const r=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${DK_KEY}`},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:AI_PROMPT},{role:'user',content:up}],temperature:.3,response_format:{type:'json_object'}})});
        if(!r.ok) throw new Error(`API ${r.status}`);
        const d=await r.json(); const c=d.choices[0].message.content.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
        return JSON.parse(c);
    }catch(e){ throw e; }
};

// 中文时间解析 (AI 失败兜底)
const parseTime = (text,ref=new Date)=>{
    const d=new Date(ref); d.setHours(0,0,0,0);
    if(/大后天/.test(text))d.setDate(d.getDate()+3); else if(/后天/.test(text))d.setDate(d.getDate()+2); else if(/明天/.test(text))d.setDate(d.getDate()+1);
    const wm={'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':0,'天':0};
    const nw=text.match(/下周([一二三四五六日天])/); if(nw){const t=wm[nw[1]],c=d.getDay(),du=(t-c+7)%7||7;d.setDate(d.getDate()+du);}
    const dm=text.match(/(\d{1,2})月(\d{1,2})[日号]?/); if(dm){d.setMonth(parseInt(dm[1])-1);d.setDate(parseInt(dm[2]));}
    let h=ref.getHours(),m=ref.getMinutes(); const tm=text.match(/(\d{1,2})[点:：](\d{1,2})?/);
    if(tm){h=parseInt(tm[1]);m=tm[2]?parseInt(tm[2]):0;if(/(下午|晚上)/.test(text)&&h<12)h+=12;}
    if(/半/.test(text)&&m===0)m=30;
    d.setHours(h,m,0,0); return d;
};

// 本地规则 (AI 不可用时)
const localParse = text => {
    if(/^(目标|标签)[：:]\s*(.+)/.test(text)){
        const m=text.match(/^(目标|标签)[：:]\s*(.+)/);
        return {type:'objective',ai_metadata:{title:m[2].trim(),color:OBJ_PALETTE[Math.floor(Math.random()*OBJ_PALETTE.length)]}};
    }
    const isTodo=/要|去|记得|做|完成|写|整理|准备|列出|标注/.test(text)&&!/完成了|做了|读了|跑了/.test(text);
    return {type:isTodo?'todo':'note',objective_id:null,ai_metadata:{task:text.substring(0,30),progress_delta:isTodo?0:1,tags:[]},timeline_time:null};
};

// 关键词→目标匹配
const matchObj = (text, objs) => { for(const o of objs){ for(const kw of o.title.split(/[\s\-\—]+/)){ if(kw.length>=2&&text.includes(kw))return o.id; } } return null; };

// ==========================================
// Icons
// ==========================================
const Ic = {
    Plus: ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    Send: ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
    Mic: ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>,
    Check: ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
    Trash: ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
    Target: ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
};

// ==========================================
// HUD — 川上标题 + 3D球体OKR + 日历热力
// ==========================================
const HUD = ({ objectives, events, todayTodos, onAddObj, onEditObj, onDeleteObj, onFilterObj, activeFilter, selectedDate, onSelectDate, isOpen, onToggle }) => {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const firstDay = new Date(year, month, 1).getDay();
    const startOffset = firstDay===0?6:firstDay-1;

    const dayStats = useMemo(() => {
        const stats = {};
        events.forEach(e => {
            const d = new Date(e.timeline_time);
            if (d.getFullYear()===year && d.getMonth()===month) {
                const k = d.getDate();
                if (!stats[k]) stats[k] = { total: 0, objs: {} };
                stats[k].total++;
                const oid = e.objective_id || '_none';
                stats[k].objs[oid] = (stats[k].objs[oid]||0) + 1;
            }
        });
        return stats;
    }, [events, year, month]);

    // OKR 进度球体 — 按百分比填色
    const ObjSphere = ({ o, size = 64 }) => {
        const pct = o.target>0 ? Math.min((o.current/o.target)*100, 100) : 0;
        const active = activeFilter===o.id;
        const longPressRef = useRef(null);
        const fillColor = o.color;
        const s = size;

        const startPress = () => { longPressRef.current = setTimeout(() => onEditObj(o), 600); };
        const endPress = () => { if (longPressRef.current) { clearTimeout(longPressRef.current); longPressRef.current = null; } };
        const click = () => { if (longPressRef.current) return; onFilterObj(active?null:o.id); };

        // 球体底面
        const baseBg = '#EDE7E0';
        // 简单高光 — 左上角一点亮
        const gloss = 'radial-gradient(circle at 35% 28%, rgba(255,255,255,0.4) 0%, transparent 50%)';
        // 选中发光
        const glow = active
            ? `0 0 16px ${fillColor}55, 0 0 36px ${fillColor}20`
            : '0 2px 10px rgba(139,127,184,0.10)';

        return (
            <div className="flex flex-col items-center gap-1.5 select-none"
                onMouseDown={startPress} onMouseUp={endPress} onMouseLeave={endPress}
                onTouchStart={startPress} onTouchEnd={endPress}
                onClick={click}>
                {/* 球体 */}
                <div className="relative cursor-pointer transition-transform duration-300 hover:scale-105"
                    style={{width:s,height:s}}>
                    {/* 底面 */}
                    <div className="absolute inset-0 rounded-full"
                        style={{background:baseBg,boxShadow:glow}}/>
                    {/* 填充 — 从底部按百分比上升 */}
                    <div className="absolute inset-0 rounded-full overflow-hidden">
                        <div className="absolute bottom-0 left-0 right-0 transition-all duration-800 ease-out"
                            style={{
                                height:`${pct}%`,
                                backgroundColor:fillColor,
                                opacity:0.88,
                                borderRadius:pct>98?'50%':'0 0 50% 50%'
                            }}/>
                    </div>
                    {/* 高光 */}
                    <div className="absolute inset-0 rounded-full pointer-events-none"
                        style={{background:gloss}}/>
                    {/* 细边框 */}
                    <div className="absolute inset-0 rounded-full pointer-events-none"
                        style={{border:`1px solid ${active?'rgba(184,181,224,0.5)':'rgba(184,181,224,0.15)'}`}}/>
                    {/* 百分比 — 仅在选中时显示 */}
                    {active && (
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <span className="text-[11px] font-medium tabular-nums"
                                style={{color:pct>55?'#fff':'var(--text-secondary)'}}>
                                {Math.round(pct)}%
                            </span>
                        </div>
                    )}
                </div>
                {/* 标题 — 仅在选中时显示 */}
                {active && (
                    <span className="text-[9px] text-center leading-tight max-w-[70px] truncate"
                        style={{color:fillColor,fontWeight:'500'}}>
                        {o.title.length>6?o.title.slice(0,6)+'…':o.title}
                    </span>
                )}
            </div>
        );
    };

    // 日历球
    const renderOrb = (d) => {
        const s = dayStats[d] || { total:0, objs:{} };
        const hasData = s.total > 0;
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let bgStyle = { backgroundColor: '#EDE7E0' };
        if (hasData) {
            const entries = Object.entries(s.objs);
            if (entries.length >= 1) {
                const total = entries.reduce((sum,[,c])=>sum+c,0);
                const gradients = entries.map(([oid, count], i) => {
                    const o = objectives.find(x=>x.id===oid);
                    const color = o?.color || '#B8B5E0';
                    const ratio = count/total;
                    return `radial-gradient(circle at ${30+(i*30)}% ${40+(i*20)}%, ${color}${Math.round(ratio*90)} 0%, transparent 65%)`;
                });
                bgStyle = {
                    background: gradients.join(', ') + ', #EDE7E0',
                    boxShadow: hasData ? `0 0 ${8+s.total*3}px rgba(139,127,184,${Math.min(s.total*0.08,0.25)})` : 'none',
                };
            }
        }
        const sel = selectedDate===dateStr;
        return (
            <div key={d} onClick={()=>onSelectDate(sel?null:dateStr)}
                className={`aspect-square rounded-full flex items-center justify-center text-[10px] cursor-pointer transition-all duration-300 hover:scale-110 relative ${sel?'ring-1 scale-110':''}`}
                style={{...bgStyle, ...(sel?{boxShadow:'0 0 0 2px var(--accent-400)'}:{})}}>
                <span className="relative z-10 font-light" style={{color:hasData||sel?'var(--text-primary)':'var(--text-tertiary)'}}>{d}</span>
            </div>
        );
    };

    return (
        <div className="fixed top-0 left-0 right-0 z-50">
            <div className="glass-strong px-4 pt-12 pb-3" style={{boxShadow:'var(--shadow-header)'}}>
                {/* 标题行 */}
                <div className="flex justify-between items-end mb-4">
                    <div>
                        <h1 className="text-xl font-light tracking-[0.15em]" style={{color:'var(--text-primary)'}}>川上</h1>
                        <p className="text-[9px] mt-0.5 tracking-widest" style={{color:'var(--text-tertiary)'}}>timeline · FrsionOS v2</p>
                    </div>
                    <button onClick={onToggle} className="text-[10px] transition-colors tracking-wider" style={{color:'var(--text-tertiary)'}}>
                        {isOpen?'收起日历':'展开日历'}
                    </button>
                </div>

                {/* 3D 球体 OKR 展示 — 水平可滑动 */}
                <div className="overflow-x-auto no-scrollbar -mx-4 px-4 mb-3">
                    <div className="flex items-center justify-center gap-5 min-w-min">
                        {objectives.map(o => <ObjSphere key={o.id} o={o} size={58}/>)}
                        {objectives.length===0 && (
                            <div className="text-[10px] py-4" style={{color:'var(--text-tertiary)'}}>还没有目标，输入 "/目标 名称" 创建</div>
                        )}

                    </div>
                    <div className="grid grid-cols-7 gap-2 mb-2 text-center text-[9px]" style={{color:'var(--text-tertiary)'}}>
                        {['一','二','三','四','五','六','日'].map(w=><div key={w}>{w}</div>)}
                    </div>
                    <div className="grid grid-cols-7 gap-2">
                        {Array.from({length:startOffset}).map((_,i)=><div key={`e${i}`}></div>)}
                        {Array.from({length:daysInMonth}).map((_,i)=>renderOrb(i+1))}
                    </div>
                    <div className="flex justify-center gap-4 mt-3 text-[9px]" style={{color:'var(--text-tertiary)'}}>
                        {objectives.slice(0,4).map(o=>

                        )}
                    </div>
                </div>
            </div>
        </div>
    );
};

// EventCard — 无边框，2px 左侧彩线

            <div className="mb-8 animate-fade-in">

                </div>

                    <div className="mt-2">
                        <label className="text-[10px] block mb-1" style={{color:'var(--text-tertiary)'}}>时间</label>
                        <input type="datetime-local" className="w-full glass-light p-2 text-sm outline-none rounded-xl" style={{color:'var(--text-primary)'}}
                            value={(()=>{const d=new Date(editData.timeline_time);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;})()}
                            onChange={e=>{const v=e.target.value;if(v){const d=new Date(v);setEditData({...editData,timeline_time:d.toISOString()});}}}/>
                    </div>
                    <div className="mt-2 flex items-center gap-2">

                            checked={editData.status==='done'} onChange={e=>setEditData({...editData,status:e.target.checked?'done':'pending'})}/>
                        <label htmlFor={`done-${editData.id}`} className="text-xs select-none" style={{color:'var(--text-secondary)'}}>已完成</label>

                    <div className="flex gap-2 mt-2">
                        <select className="flex-1 glass-light px-3 py-2 text-xs outline-none rounded-xl" style={{color:'var(--text-secondary)'}}
                            value={editData.objective_id||''} onChange={e=>setEditData({...editData,objective_id:e.target.value||null})}>
                            <option value="">不关联目标</option>
                            {objectives.map(o=><option key={o.id} value={o.id}>{o.title}</option>)}
                        </select>
                        <select className="flex-1 glass-light px-3 py-2 text-xs outline-none rounded-xl" style={{color:'var(--text-secondary)'}}
                            value={editData.type} onChange={e=>setEditData({...editData,type:e.target.value})}>
                            <option value="note">笔记</option><option value="todo">待办</option>
                        </select>
                    </div>
                    <div className="flex gap-2 mt-2">
                        <button onClick={()=>{onUpdate(event.id,editData);setEditing(false);}} className="flex-1 text-xs py-2 font-medium rounded-xl" style={{backgroundColor:'var(--accent-300)',color:'var(--text-inverse)'}}>保存</button>
                        <button onClick={()=>setEditing(false)} className="flex-1 text-xs py-2 rounded-xl" style={{color:'var(--text-tertiary)'}}>取消</button>
                        <button onClick={()=>setShowDel(!showDel)} className="px-3 hover:text-red-400" style={{color:'var(--text-tertiary)'}}><Ic.Trash/></button>
                    </div>
                    {showDel&&<button onClick={()=>{onDelete(event.id);setEditing(false);}} className="w-full mt-2 bg-red-500/10 text-red-400 text-xs py-2 rounded-xl hover:bg-red-500/20">确认删除</button>}
                </div>
            </div>

    }

    return (
        <div className="group mb-6 cursor-pointer transition-all duration-300 hover:scale-[1.01]" onClick={()=>setEditing(true)}>
            {/* 彩色连接点 — 继承目标颜色 */}
            <div className="flex justify-center mb-2">
                <div className="w-2 h-2 rounded-full transition-shadow duration-300" style={{
                    backgroundColor: accent,
                    boxShadow: `0 0 8px ${accent}55, 0 0 16px ${accent}20`
                }}/>
            </div>
            {/* 玻璃卡片 */}
            <div className="glass p-4 transition-shadow duration-300" style={{
                borderRadius:'16px',
                borderLeft:`2px solid ${pending?accent+'60':accent}`

                <div className="flex items-baseline gap-2 mb-1.5">
                    <span className="text-[10px] tabular-nums" style={{color:'var(--text-tertiary)'}}>{fmtTime(d)}</span>
                    {obj && <span className="text-[9px] truncate max-w-[140px] font-medium" style={{color:accent}}>{obj.title}</span>}
                    <span className="text-[9px]" style={{color:'var(--text-tertiary)'}}>{TYPE_LABELS[event.type]}</span>

                <p className="text-sm leading-relaxed mb-1 font-light" style={{color:pending?'var(--text-secondary)':'var(--text-primary)'}}>{event.raw_content}</p>
                {event.ai_metadata?.task && <p className="text-[11px] font-light" style={{color:'var(--text-tertiary)'}}>{event.ai_metadata.task}{(event.ai_metadata?.progress_delta||0)>0&&<span className="ml-1 font-medium" style={{color:accent}}>+{event.ai_metadata.progress_delta}</span>}</p>}
                {event.ai_metadata?.tags?.length>0 && <div className="flex gap-1 mt-1 flex-wrap">{event.ai_metadata.tags.map((t,i)=><span key={i} className="text-[9px] px-1.5 py-0.5 rounded-md" style={{backgroundColor:'var(--accent-100)',color:'var(--accent-500)'}}>{t}</span>)}</div>}

                {event.status==='done'&&<span className="text-[10px]" style={{color:'var(--text-tertiary)'}}>已完成</span>}
            </div>
        </div>
    );
};

// ==========================================
// Omnibox
// ==========================================
const Omnibox = ({ onSubmitText, isProcessing }) => {
    const [text,setText]=useState('');
    const [listening,setListening]=useState(false);
    const [voiceOk,setVoiceOk]=useState(true);
    const recRef=useRef(null);

    const getRec=()=>{
        if(recRef.current)return recRef.current;
        const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        if(!SR){setVoiceOk(false);return null;}
        const r=new SR();r.lang='zh-CN';r.interimResults=true;r.continuous=false;
        r.onresult=e=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;setText(t);if(e.results[e.results.length-1].isFinal){setListening(false);setTimeout(()=>{if(t.trim()){onSubmitText(t.trim());setText('');}},400);}};
        r.onerror=()=>setListening(false);r.onend=()=>setListening(false);
        recRef.current=r;return r;
    };
    const toggleVoice=()=>{if(listening){recRef.current?.stop();return;}const r=getRec();if(!r)return;try{r.start();setListening(true);setText('');}catch{}};
    const submit=e=>{e.preventDefault();if(text.trim()&&!isProcessing){onSubmitText(text.trim());setText('');}};

    return (
        <div className="fixed bottom-0 left-0 right-0 p-4 pb-8 z-50" style={{background:'linear-gradient(to top,rgba(245,240,235,1) 0%,rgba(245,240,235,0.95) 60%,transparent 100%)'}}>
            <form onSubmit={submit} className={`flex items-center gap-2 max-w-lg mx-auto h-11 px-4 glass-light transition-all duration-300 rounded-xl ${isProcessing?'animate-pulse-glow':''}`}>
                <input type="text" value={text} onChange={e=>setText(e.target.value)} placeholder={isProcessing?'AI 处理中...':listening?'聆听中...':'输入记录 或 "/目标 名称" 创建目标'} disabled={isProcessing} className="flex-1 bg-transparent border-none outline-none text-sm font-light disabled:opacity-30" style={{color:'var(--text-primary)'}}/>
                {text.trim()?<button type="submit" disabled={isProcessing} style={{color:'var(--text-tertiary)'}}><Ic.Send/></button>
                :voiceOk?<button type="button" onClick={toggleVoice} style={{color:listening?'var(--color-error)':'var(--text-tertiary)'}}><Ic.Mic/></button>
                :null}
            </form>
        </div>
    );
};

// ==========================================
// App
// ==========================================
const App = () => {
    // 支持 ?reset 参数强制清除旧数据
    if (window.location.search.includes('reset')) {
        localStorage.removeItem(EV_KEY);
        localStorage.removeItem(OBJ_KEY);
        console.log('localStorage cleared — using mock data');
    }
    const [events,setEvents]=useState(()=>{const d=load(EV_KEY);return(d&&d.length)?d:MOCK_EVENTS;});
    const [objectives,setObjectives]=useState(()=>{const d=load(OBJ_KEY);return(d&&d.length)?d:MOCK_OBJS;});
    const [hudOpen,setHudOpen]=useState(false);
    const [processing,setProcessing]=useState(false);
    const [activeFilter,setActiveFilter]=useState(null);
    const [selectedDate,setSelectedDate]=useState(null);
    const [toast,setToast]=useState(null);
    const [objEditor,setObjEditor]=useState(null); // null | {objective}|true (=新建)
    const feedRef=useRef(null); const nowRef=useRef(null);

    // 启动时从 Supabase 加载数据
    useEffect(()=>{
        (async () => {
            const remote = await loadFromSB();
            if (remote) {
                if (remote.events.length > 0) {
                    setEvents(remote.events);
                    save(EV_KEY, remote.events);
                }
                if (remote.objectives.length > 0) {
                    setObjectives(remote.objectives);
                    save(OBJ_KEY, remote.objectives);
                }
                console.log(`[Supabase] loaded ${remote.events.length} events, ${remote.objectives.length} objectives`);
            }
        })();
    },[]);
    useEffect(()=>{save(EV_KEY,events);},[events]);
    useEffect(()=>{save(OBJ_KEY,objectives);},[objectives]);
    useEffect(()=>{nowRef.current?.scrollIntoView({behavior:'auto',block:'center'});},[]);

    const toast_ = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };

    const now=new Date();
    const nowIso=now.toISOString();

    // 今日待办统计
    const todayTodos=useMemo(()=>{
        const ts=todayStr();
        const todayEs=events.filter(e=>e.type==='todo'&&e.timeline_time.startsWith(ts));
        return {done:todayEs.filter(e=>e.status==='done').length,total:todayEs.length};
    },[events]);

    const filtered=useMemo(()=>{
        let es=[...events].sort((a,b)=>new Date(b.timeline_time)-new Date(a.timeline_time));
        if(activeFilter) es=es.filter(e=>e.objective_id===activeFilter);
        if(selectedDate) es=es.filter(e=>tsDay(new Date(e.timeline_time))===selectedDate);
        return es;
    },[events,activeFilter,selectedDate]);

    const future=filtered.filter(e=>e.timeline_time>nowIso);
    const past=filtered.filter(e=>e.timeline_time<=nowIso);

    const handleSubmit = async text => {
        // "/目标" 前缀 → 直接创建目标
        if(/^\/目标[：:]\s*(.+)/.test(text)||/^\/obj[：:]\s*(.+)/i.test(text)){
            const m=text.match(/^(?:\/目标|\/obj)[：:]\s*(.+)/);
            const title=m[1].trim();
            setObjectives(prev=>[...prev,{id:uid(),title,target:100,current:0,color:OBJ_PALETTE[Math.floor(Math.random()*OBJ_PALETTE.length)]}]);
            toast_(`目标「${title}」已创建`); return;
        }

        setProcessing(true);
        try {
            let aiRes; try{aiRes=await callAI(text,objectives);}catch(e){aiRes=localParse(text);}
            if(aiRes.type==='objective'){
                setObjectives(prev=>[...prev,{id:uid(),title:aiRes.ai_metadata.title,target:100,current:0,color:aiRes.ai_metadata.color||OBJ_PALETTE[Math.floor(Math.random()*OBJ_PALETTE.length)]}]);
                toast_(`AI 创建目标「${aiRes.ai_metadata.title}」`); setProcessing(false); return;
            }
            let tl=aiRes.timeline_time?new Date(aiRes.timeline_time):null;
            if(!tl||isNaN(tl.getTime())) tl=parseTime(text);
            const oid=aiRes.objective_id||matchObj(text,objectives);
            const ev={id:uid(),timeline_time:tl.toISOString(),record_time:new Date().toISOString(),raw_content:text,type:aiRes.type||'note',status:'pending',objective_id:oid||undefined,ai_metadata:aiRes.ai_metadata||{}};
            setEvents(prev=>[ev,...prev]);
            saveEventToSB(ev);
            if(oid&&(aiRes.ai_metadata?.progress_delta||0)>0){
                setObjectives(prev=>{
                    const updated=prev.map(o=>o.id===oid?{...o,current:o.current+(aiRes.ai_metadata.progress_delta||0)}:o);
                    const obj=updated.find(o=>o.id===oid);
                    if(obj) saveObjToSB(obj);
                    return updated;
                });
            }
            const on=objectives.find(o=>o.id===oid);
            toast_(`${TYPE_LABELS[ev.type]} · ${fmtDate(tl)} ${fmtTime(tl)}${on?' → '+on.title:''}`);
        }catch(e){toast_('⚠ '+(e.message||'出错'));}
        finally{setProcessing(false);setTimeout(()=>nowRef.current?.scrollIntoView({behavior:'smooth',block:'center'}),100);}
    };

    const confirmEvent=id=>{
        setEvents(prev=>{
            const updated=prev.map(e=>e.id===id?{...e,status:'done'}:e);
            const ev=updated.find(e=>e.id===id);
            if(ev) saveEventToSB(ev);
            return updated;
        });
        toast_('✓ 已完成');
    };
    const updateEvent=(id,data)=>{
        setEvents(prev=>{
            const updated=prev.map(e=>e.id===id?{...e,...data}:e);
            const ev=updated.find(e=>e.id===id);
            if(ev) saveEventToSB(ev);
            return updated;
        });
    };
    const deleteEvent=id=>{
        setEvents(prev=>prev.filter(e=>e.id!==id));
        deleteEventFromSB(id);
        toast_('已删除');
    };
    const deleteObj=id=>{
        setObjectives(prev=>prev.filter(o=>o.id!==id));
        setEvents(prev=>prev.map(e=>e.objective_id===id?{...e,objective_id:undefined}:e));
        deleteObjFromSB(id);
        setActiveFilter(f=>f===id?null:f);
        toast_('目标已删除');
    };
    const saveObj=data=>{
        const newObj = objEditor===true
            ? {id:uid(),...data}
            : {...objEditor,...data};
        if(objEditor===true){
            setObjectives(prev=>[...prev,newObj]);
            toast_('目标已创建');
        }else{
            setObjectives(prev=>prev.map(o=>o.id===objEditor.id?{...o,...data}:o));
            toast_('目标已更新');
        }
        saveObjToSB(newObj);
        setObjEditor(null);
    };

    // 渲染时间轴
    const renderTL = list => {
        let lastDate=null;
        return list.map(ev=>{
            const d=new Date(ev.timeline_time); const ds=tsDay(d); const showDiv=lastDate!==ds; lastDate=ds;
            return <React.Fragment key={ev.id}>
                {showDiv&&<div id={`date-${ds}`} className="flex items-center gap-3 py-8 first:pt-0"><div className="flex-1 h-px" style={{backgroundColor:'rgba(184,181,224,0.15)'}}></div><span className="text-[10px] font-light tracking-wider" style={{color:'var(--text-tertiary)'}}>{ds}</span><div className="flex-1 h-px" style={{backgroundColor:'rgba(184,181,224,0.15)'}}></div></div>}
                <EventCard event={ev} objectives={objectives} onConfirm={confirmEvent} onUpdate={updateEvent} onDelete={deleteEvent}/>
            </React.Fragment>;
        });
    };

    // ==========================================
    // 空时间轴欢迎卡片
    // ==========================================
    const EmptyWelcome = () => (
        <div className="flex flex-col items-center justify-center py-16 animate-fade-in">
            <div className="glass w-72 p-6 text-center space-y-3" style={{borderRadius:'20px',boxShadow:'var(--shadow-card)'}}>
                <div className="w-3 h-3 rounded-full mx-auto animate-shimmer" style={{background:'radial-gradient(circle at 40% 35%, rgba(200,195,210,0.8), rgba(184,181,224,0.3))',boxShadow:'0 0 12px rgba(184,181,224,0.3)'}}></div>
                <p className="text-sm font-medium" style={{color:'var(--text-primary)'}}>时间轴为空</p>
                <p className="text-xs leading-relaxed" style={{color:'var(--text-tertiary)'}}>在下方输入框记录第一个事件<br/>开启你的时间之河</p>
            </div>
        </div>
    );

    // 回到此时 — 浮动按钮
    const [showScrollBtn, setShowScrollBtn] = useState(false);
    useEffect(() => {
        const el = feedRef.current;
        if (!el) return;
        const onScroll = () => {
            const nowEl = nowRef.current;
            if (!nowEl) return;
            const rect = nowEl.getBoundingClientRect();
            const containerRect = el.getBoundingClientRect();
            setShowScrollBtn(rect.top < 0 || rect.top > containerRect.height);
        };
        el.addEventListener('scroll', onScroll, {passive:true});
        return () => el.removeEventListener('scroll', onScroll);
    }, []);
    const scrollToNow = () => {
        nowRef.current?.scrollIntoView({behavior:'smooth',block:'center'});
    };

    return (
        <div className="relative h-full w-full flex flex-col">
            <div className="absolute inset-0 beige-bg z-0"></div>
            {toast&&<div className="fixed top-20 left-1/2 -translate-x-1/2 z-[80] animate-in"><div className="glass-strong px-5 py-2.5 text-xs font-light tracking-wide rounded-xl" style={{color:'var(--text-primary)',boxShadow:'var(--shadow-card)'}}>{toast}</div></div>}
            {objEditor!==null&&<ObjEditor objective={objEditor===true?null:objEditor} onSave={saveObj} onClose={()=>setObjEditor(null)}/>}

            <HUD objectives={objectives} events={events} todayTodos={todayTodos} onAddObj={()=>setObjEditor(true)} onEditObj={o=>setObjEditor(o)} onDeleteObj={deleteObj} onFilterObj={setActiveFilter} activeFilter={activeFilter} selectedDate={selectedDate} onSelectDate={setSelectedDate} isOpen={hudOpen} onToggle={()=>setHudOpen(!hudOpen)}/>

            <div ref={feedRef} className="flex-1 overflow-y-auto no-scrollbar flow-scroll pt-10 pb-32 px-5 z-10 relative"
                style={{paddingTop:hudOpen?'400px':'190px',transition:'padding-top 0.5s ease-out'}}>
                <div className="max-w-lg mx-auto">
                    {(activeFilter||selectedDate)&&<div className="flex items-center gap-2 mb-4 text-[10px]">
                        <span style={{color:'var(--text-tertiary)'}}>筛选:</span>
                        {activeFilter&&<span style={{color:objectives.find(o=>o.id===activeFilter)?.color}}>{objectives.find(o=>o.id===activeFilter)?.title}</span>}
                        {selectedDate&&<span style={{color:'var(--text-tertiary)'}}>{selectedDate}</span>}
                        <button style={{color:'var(--text-tertiary)'}} onClick={()=>{setActiveFilter(null);setSelectedDate(null);}}>清除</button>
                    </div>}
                    {filtered.length===0 && !activeFilter && !selectedDate ? <EmptyWelcome/> : <>
                        {renderTL(future)}
                        <div ref={nowRef} className="flex items-center gap-3 py-10"><div className="flex-1 h-px" style={{backgroundColor:'rgba(184,181,224,0.2)'}}></div><span className="text-[10px] font-light tracking-[0.3em]" style={{color:'var(--accent-400)'}}>此时</span><div className="flex-1 h-px" style={{backgroundColor:'rgba(184,181,224,0.2)'}}></div></div>
                        {renderTL(past)}
                        <div className="py-16 text-center text-[10px] font-light tracking-widest" style={{color:'var(--text-tertiary)',opacity:0.5}}>时间轴边界</div>
                    </>}
                </div>
            </div>

            {/* 回到此时 — 浮动按钮 */}
            {showScrollBtn && (
                <button onClick={scrollToNow}
                    className="fixed right-5 z-40 glass animate-fade-in flex items-center justify-center"
                    style={{
                        bottom:'120px',width:44,height:44,borderRadius:'50%',
                        boxShadow:'var(--shadow-card)',
                    }}>
                    <span className="text-xs" style={{color:'var(--accent-400)'}}>↓</span>
                </button>
            )}

            <Omnibox onSubmitText={handleSubmit} isProcessing={processing}/>
        </div>
    );
};

try {
    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
} catch(err){
    const fb=document.getElementById('fallback');
    if(fb){fb.style.display='block';fb.textContent='Error: '+(err.message||err);}
    console.error(err);
}
</script>
</body>
</html>
